version: '3.8'

services:

  # ── KAFKA (KRaft — sans Zookeeper) ──────────────────────────
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka_parking
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── POSTGRESQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres_parking
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: Parking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── PGADMIN (interface web PostgreSQL) ───────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_parking
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@parking.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - postgres

  # ── KAFKA UI (interface web Kafka) ───────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafkaui_parking
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: parking-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

volumes:
  postgres_data: